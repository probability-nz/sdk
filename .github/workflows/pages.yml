name: Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # rehype-mermaid renders diagrams via headless Chromium at build time.
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm --filter @probability-nz/docs docs

      - name: Stage site
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          mkdir -p _site
          cp -r packages/docs/dist/. _site/
          for dir in examples/*/; do
            name=$(basename "$dir")
            VITE_BASE_PATH="/$REPO/examples/$name/" pnpm -C "$dir" build
            mkdir -p "_site/examples/$name"
            cp -r "$dir/dist/." "_site/examples/$name/"
          done

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
